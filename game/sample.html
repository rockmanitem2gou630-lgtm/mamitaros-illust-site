<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプルゲーム | マミタロスが作った</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.webp" type="image/webp">
</head>

<body>
  <header class="site-header">
    <h1>サンプルゲーム</h1>
    <p>ツクールMZ作品の埋め込み確認ページです。</p>

    <nav class="site-nav">
      <a href="../index.html">イラスト</a>
      <a href="../downloads.html">配布</a>
    </nav>
  </header>

  <main>
    <section class="game-section">

  <div class="game-mobile-lead">
    <p class="game-mobile-label">スマホではこちらがおすすめ</p>

    <a
      href="./sample-game/index.html"
      class="game-fullscreen-button">
      📱 全画面でプレイ
    </a>

    <p class="game-fullscreen-note">
      ブラウザの「戻る」で、このページへ戻れます。
    </p>
  </div>

  <div class="game-embed-heading">
    <h2>埋め込み表示</h2>
    <p>PCや動作確認用に、そのままページ内でも遊べます。</p>
  </div>

  <div class="game-frame-wrap">
    <iframe
      src="./sample-game/index.html"
      class="game-frame"
      title="サンプルゲーム"
      allowfullscreen>
    </iframe>
  </div>

      <div class="game-info">
        <h2>操作方法</h2>
        <p>
          クリック・タップ・キーボード操作で動作確認できます。<br>
          スマホでは全画面表示を推奨しています。<br>
          拡大や画面回転を行うと、動作が不安定になる場合があります。
        </p>
      </div>
    </section>
  </main>
</body>
</html>
