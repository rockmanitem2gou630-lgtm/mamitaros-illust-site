<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マミタロスが描いた</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="./favicon.webp" type="image/webp">
</head>

<body>
  <header class="site-header">
    <h1>まみさんが描いた絵</h1>
    <p>イラストを時系列でまとめた保管庫です。</p>
  </header>

  <nav class="site-nav">
  <a href="index.html">イラスト</a>
  <a href="downloads.html">配布</a>
</nav>

  <main>
    <section class="tag-groups">
      <div id="genreTagArea" class="tag-area genre-tag-area"></div>
      <div id="workTagArea" class="tag-area work-tag-area"></div>
    </section>
    <div id="dreamNotice" class="dream-notice" style="display: none;">
  <p>
    夢絵は苦手な方への配慮として、通常一覧には表示していません。<br>
    このサイトでは、OC・夢主×公式キャラのCP要素を含む作品を夢絵として扱っています。<br>
    キャラメイク可能なゲームの自機・主人公×公式キャラ絵は通常作品として扱っています。
  </p>
</div>
    <section id="gallery" class="gallery"></section>
  </main>
  <button id="backToTop" class="back-to-top">↑ 上へ</button>

  <div id="modal" class="modal">
    <div class="modal-content">
      <button id="modalClose" class="modal-close">×</button>
      <img id="modalImage" src="" alt="">
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p id="modalDate"></p>
        <div id="modalTags" class="art-tags"></div>
        <p id="modalComment"></p>
        <div class="art-modal-nav">
          <button id="modalPrevArt" class="art-modal-nav-button">← 前の作品へ</button>
          <button id="modalNextArt" class="art-modal-nav-button">次の作品へ →</button>
        </div>
      </div>
    </div>
  </div>
<div id="mangaModal" class="modal">
  <div class="modal-content manga-modal-content">
    <button id="mangaModalClose" class="modal-close">×</button>

    <div class="manga-viewer">
  <button id="mangaPrev" class="manga-nav">←</button>
  <div id="mangaPages" class="manga-pages"></div>
  <button id="mangaNext" class="manga-nav">→</button>
</div>

<div id="mangaPageInfo" class="manga-page-info"></div>

<div class="modal-info manga-info">
  <h2 id="mangaModalTitle"></h2>
  <p id="mangaModalDate"></p>
  <div id="mangaModalTags" class="art-tags"></div>
  <p id="mangaModalComment"></p>
  <div class="art-modal-nav">
    <button id="mangaPrevArt" class="art-modal-nav-button">← 前の作品へ</button>
    <button id="mangaNextArt" class="art-modal-nav-button">次の作品へ →</button>
  </div>
</div>
  </div>
</div>
  <script src="artworks.js"></script>
  <script src="script.js"></script>
</body>
</html>
