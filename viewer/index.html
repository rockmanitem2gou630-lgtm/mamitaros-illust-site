<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    background:#f7f4ef;
    font-family:sans-serif;
}

.viewer{

    max-width:1200px;
    margin:auto;
    padding:24px;

}

model-viewer{

    width:100%;
    height:75vh;

    background:white;

    border-radius:20px;

}

.buttons{

    display:flex;
    gap:10px;
    margin-bottom:20px;
    justify-content:center;

}

button{

    padding:10px 18px;

}

</style>

</head>

<body>

<div class="viewer">

<div class="buttons">

<button
data-model="models/haste_scythe.glb">

ヘイスト

</button>

<button
data-model="models/bloodmoonhaste_scythe.glb">

赤月の貴族ヘイスト

</button>

</div>

<model-viewer

id="viewer"

src="models/haste_scythe.glb"

camera-controls

auto-rotate

shadow-intensity="1"

>

</model-viewer>

</div>

<script>

const viewer=document.getElementById("viewer");

document.querySelectorAll("button").forEach(button=>{

button.onclick=()=>{

viewer.src=button.dataset.model;

};

});

</script>

</body>
</html>
