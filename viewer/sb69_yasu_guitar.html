<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>3Dプレビュー | マミタロスが作った</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.webp" type="image/webp">

  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    .viewer-page {
      max-width: 1200px;
      margin: 0 auto 48px;
    }

    .model-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .model-button {
      border: 1px solid #c8b8ad;
      background: #fffaf5;
      color: #3a302b;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      cursor: pointer;
    }

    .model-button.active {
      background: #2b2522;
      color: #fff;
    }

    .viewer-wrap {
      background: #fffaf5;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    model-viewer {
      width: 100%;
      height: 75vh;
      background: #fff;
      border-radius: 14px;
    }

    .viewer-info {
      margin-top: 20px;
      padding: 18px;
      background: #fffaf5;
      border-radius: 18px;
      line-height: 1.8;
    }

    .viewer-info h2 {
      margin-top: 0;
    }

    @media (max-width: 700px) {
      .viewer-page {
        margin-bottom: 24px;
      }

      model-viewer {
        height: 65vh;
      }

      .model-button {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <h1>3Dプレビュー</h1>
    <p>ドラッグやスワイプでモデルを回転できます。</p>

    <nav class="site-nav">
      <a href="../index.html">イラスト</a>
      <a href="../downloads.html">配布</a>
    </nav>
  </header>

  <main>
    <section class="viewer-page">
      <div class="model-buttons">
        <button
          type="button"
          class="model-button active"
          data-model="models/sb69_yasu_guitar.glb"
          data-title="八咫之鉄紺青鴉式">
          八咫之鉄紺青鴉式
        </button>
      </div>

      <div class="viewer-wrap">
        <model-viewer
          id="modelViewer"
          src="models/sb69_yasu_guitar.glb"
          camera-controls
          auto-rotate
          shadow-intensity="1"
          alt="八咫之鉄紺青鴉式の3Dモデル">
        </model-viewer>
      </div>

      <div class="viewer-info">
        <h2 id="modelTitle">八咫之鉄紺青鴉式</h2>
        <p>
          マウスドラッグまたはスワイプで回転、ホイールやピンチ操作で拡大・縮小できます。
        </p>
      </div>
    </section>
  </main>

  <script>
    const viewer = document.getElementById("modelViewer");
    const modelTitle = document.getElementById("modelTitle");
    const buttons = document.querySelectorAll(".model-button");

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        viewer.src = button.dataset.model;
        viewer.alt = `${button.dataset.title}の3Dモデル`;
        modelTitle.textContent = button.dataset.title;

        buttons.forEach(item => item.classList.remove("active"));
        button.classList.add("active");
      });
    });
  </script>
</body>
</html>
